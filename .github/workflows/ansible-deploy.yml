name: Ansible Deploy

on:
  push:
    branches: [main]
    paths:
      - 'ansible/**'
      - '.github/workflows/ansible-deploy.yml'
  workflow_dispatch:
    inputs:
      environment:
        description: Environment to deploy
        type: choice
        required: true
        default: all
        options:
          - all
          - internal
          - staging
          - production

concurrency:
  group: ansible-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-internal:
    if: github.event_name == 'push' || inputs.environment == 'all' || inputs.environment == 'internal'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          python -m pip install ansible
          ansible-galaxy collection install -r ansible/requirements.yml

      - name: Bootstrap service vault
        uses: ./.github/actions/bootstrap-vault
        with:
          deploy-dir: ansible
          layout: flat
          vault-password: ${{ secrets.ANSIBLE_VAULT_PASSWORD }}

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.ANSIBLE_SSH_PRIVATE_KEY }}" > ~/.ssh/ansible_key
          chmod 600 ~/.ssh/ansible_key
          ssh-keyscan -H 157.173.100.1 >> ~/.ssh/known_hosts

      - name: Write vault password
        run: echo "${{ secrets.ANSIBLE_VAULT_PASSWORD }}" > ansible/vault_password

      - name: Apply internal
        working-directory: ansible
        env:
          MONITORING_SLACK_WEBHOOK_URL: ${{ secrets.MONITORING_SLACK_WEBHOOK_URL }}
          MONITORING_SLACK_CHANNEL: ${{ vars.MONITORING_SLACK_CHANNEL }}
          LETSENCRYPT_EMAIL: ${{ vars.LETSENCRYPT_EMAIL }}
        run: ansible-playbook playbooks/internal.yml --private-key ~/.ssh/ansible_key --vault-password-file vault_password

      - name: Cleanup vault password
        if: always()
        run: rm -f ansible/vault_password

  deploy-staging:
    if: github.event_name == 'push' || inputs.environment == 'all' || inputs.environment == 'staging'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          python -m pip install ansible
          ansible-galaxy collection install -r ansible/requirements.yml

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.ANSIBLE_SSH_PRIVATE_KEY }}" > ~/.ssh/ansible_key
          chmod 600 ~/.ssh/ansible_key
          ssh-keyscan -H 194.163.167.168 >> ~/.ssh/known_hosts

      - name: Apply staging
        working-directory: ansible
        run: ansible-playbook playbooks/staging.yml --private-key ~/.ssh/ansible_key

  deploy-production:
    needs: deploy-staging
    if: |
      always() &&
      (needs.deploy-staging.result == 'success' || needs.deploy-staging.result == 'skipped') &&
      (github.event_name == 'push' || inputs.environment == 'all' || inputs.environment == 'production')
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Install Ansible
        run: |
          python -m pip install --upgrade pip
          python -m pip install ansible
          ansible-galaxy collection install -r ansible/requirements.yml

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s' "${{ secrets.ANSIBLE_SSH_PRIVATE_KEY }}" > ~/.ssh/ansible_key
          chmod 600 ~/.ssh/ansible_key
          ssh-keyscan -H 62.146.168.92 >> ~/.ssh/known_hosts

      - name: Check production
        working-directory: ansible
        run: ansible-playbook playbooks/production.yml --check --diff --private-key ~/.ssh/ansible_key

      - name: Apply production
        working-directory: ansible
        run: ansible-playbook playbooks/production.yml --private-key ~/.ssh/ansible_key
