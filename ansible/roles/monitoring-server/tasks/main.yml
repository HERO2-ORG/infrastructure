- name: Validate required external monitoring secret is set
  ansible.builtin.assert:
    that:
      - monitoring_slack_webhook_url | length > 0
    fail_msg: |
      Required external secret env var is empty. Set it before running this playbook:
        MONITORING_SLACK_WEBHOOK_URL  (empty value renders an invalid alertmanager.yml)
      This is wired as a GitHub Actions secret in .github/workflows/ansible-deploy.yml.
      Internal secrets (e.g. grafana_admin_password) are auto-generated by the
      bootstrap-vault action and live in ansible/secrets.yml.enc.

- name: Ensure monitoring server stack directory exists
  ansible.builtin.file:
    path: "{{ monitoring_server_stack_path }}"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0755"

- name: Ensure internal edge network exists
  community.docker.docker_network:
    name: "{{ internal_edge_network }}"
    state: present

- name: Write monitoring server files
  ansible.builtin.template:
    src: "{{ item.src }}"
    dest: "{{ monitoring_server_stack_path }}/{{ item.dest }}"
    owner: "{{ item.owner | default(deploy_user) }}"
    group: "{{ item.group | default(deploy_user) }}"
    mode: "{{ item.mode | default('0644') }}"
  loop:
    - src: docker-compose.yml.j2
      dest: docker-compose.yml
    - src: prometheus.yml.j2
      dest: prometheus.yml
    - src: alertmanager.yml.j2
      dest: alertmanager.yml
      owner: "65534"
      group: "65534"
      mode: "0600"
    - src: blackbox.yml.j2
      dest: blackbox.yml
    - src: alert-rules.yml.j2
      dest: alert-rules.yml
    - src: grafana-datasources.yml.j2
      dest: grafana-datasources.yml
    - src: grafana-dashboards.yml.j2
      dest: grafana-dashboards.yml
  no_log: "{{ item.dest == 'alertmanager.yml' }}"
  notify: Restart monitoring stack

- name: Sync Grafana dashboard JSONs
  ansible.builtin.copy:
    src: dashboards/
    dest: "{{ monitoring_server_stack_path }}/dashboards/"
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0644"
    directory_mode: "0755"
  notify: Restart monitoring stack

# Container runtime UIDs from the upstream images: prom/* run as nobody (65534),
# grafana/grafana runs as 472. Bind-mounted host dirs must be writable by these UIDs.
- name: Ensure persistent volume directories are writable by their container users
  ansible.builtin.file:
    path: "{{ monitoring_server_stack_path }}/volumes/{{ item.name }}"
    state: directory
    owner: "{{ item.uid }}"
    group: "{{ item.uid }}"
    mode: "0755"
  loop:
    - { name: prometheus, uid: "65534" }
    - { name: alertmanager, uid: "65534" }
    - { name: grafana, uid: "472" }
  notify: Restart monitoring stack

- name: Start monitoring server stack (apply mode only)
  community.docker.docker_compose_v2:
    project_src: "{{ monitoring_server_stack_path }}"
    state: present
    pull: always
  when: not ansible_check_mode
