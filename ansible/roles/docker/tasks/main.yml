- name: Check Docker CLI
  ansible.builtin.command: docker --version
  register: docker_cli
  check_mode: false
  changed_when: false
  failed_when: false

- name: Install Docker packages
  ansible.builtin.apt:
    name: "{{ docker_apt_packages }}"
    state: present
    update_cache: true
  when: docker_cli.rc != 0

- name: Ensure Docker CLI plugin directory exists
  ansible.builtin.file:
    path: "{{ docker_compose_plugin_dir }}"
    state: directory
    owner: root
    group: root
    mode: "0755"

- name: Check Docker Compose plugin
  ansible.builtin.stat:
    path: "{{ docker_compose_plugin_path }}"
  register: docker_compose_plugin

- name: Install Docker Compose plugin
  ansible.builtin.get_url:
    url: "https://github.com/docker/compose/releases/download/{{ docker_compose_version }}/docker-compose-linux-{{ docker_compose_arch }}"
    dest: "{{ docker_compose_plugin_path }}"
    owner: root
    group: root
    mode: "0755"
  when:
    - not ansible_check_mode
    - not docker_compose_plugin.stat.exists

- name: Ensure Docker service is enabled and running
  ansible.builtin.service:
    name: "{{ docker_service_name }}"
    enabled: true
    state: started

- name: Ensure deploy user exists
  ansible.builtin.user:
    name: "{{ deploy_user }}"
    groups: docker
    append: true
    shell: /bin/bash
    create_home: true

- name: Ensure stack base directory exists
  ansible.builtin.file:
    path: "{{ stack_base_path }}"
    state: directory
    owner: "{{ deploy_user }}"
    group: "{{ deploy_user }}"
    mode: "0755"
